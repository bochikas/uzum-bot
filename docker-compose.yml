services:
  bot:
    container_name: bot
    restart: always
    build:
      context: .
      target: bot
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  worker:
    container_name: worker
    restart: always
    build:
      context: .
      target: worker
    env_file: .env.docker
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  db:
    container_name: postgres
    image: postgres:18.3-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data/
    env_file: .env.docker
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "postgres", "-U", "postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    env_file: .env.docker
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

volumes:
  rabbitmq-data:
  postgres-data:
